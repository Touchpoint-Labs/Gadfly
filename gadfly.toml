# Gadfly configuration. Every key is optional — omit any to keep its default.
# Lives at the workspace root (committed); runtime state goes in .gadfly/ (gitignored).

# LLM backend: "claude_cli" (rides your Claude Code subscription, no API key) or
# "anthropic_api" (requires a key; not implemented in v1).
provider = "claude_cli"

# Class-3 surfacing dial — how often undiscussed decisions are surfaced to you:
# "autonomous" (decide + log nearly all), "balanced" (surface the consequential
# ones), or "collaborative" (surface most). Irreversible ops always ask regardless.
autonomy = "balanced"

llm_timeout = 240   # seconds per LLM call — heavy architect contexts exceed 60s on big models
llm_retries = 3     # attempts on transient errors
poll_timeout = 3.0  # seconds to wait for the transcript to flush at the gate

[models]
architect = "claude-opus-4-8"   # A/B vs fable: opus held the Socratic voice better
code = "claude-sonnet-5"
triage = "claude-haiku-4-5"

# Memory-file character budgets. 0 = disable compaction for that file.
# The LLM targets ~75% of the budget so the file has headroom to grow.
[memory]
spec = 18000
claude = 15000
codemap = 15000
memory = 12000
